# Configurações para gerenciar e configurar um backend do Firebase App Hosting.
# Documentação: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Instâncias para lidar com o tráfego. 
  # O App Hosting escala automaticamente.
  maxInstances: 1
  cpu: 1
  memoryMiB: 512

# Variáveis de ambiente podem ser adicionadas aqui se necessário no futuro
